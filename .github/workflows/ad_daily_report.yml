name: Daily Ad Performance Report

# 毎朝 JST 09:00 (UTC 00:00) に前日の広告運用指標 (インプレッション/CTR/CVR/サインアップ等)
# を GA4 Data API から取得し、テキスト要約を Slack に送信する。
# Looker Studio を毎日見に行かなくても日次サマリーが届くようにするための自動化。

on:
  schedule:
    - cron: "0 0 * * *"   # UTC 00:00 = JST 09:00
  workflow_dispatch:
    inputs:
      date:
        description: "対象日 (YYYY-MM-DD, 空なら前日)"
        required: false
        default: ""

concurrency:
  group: ad-daily-report
  cancel-in-progress: false

jobs:
  report:
    name: Summarize & send ad performance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check if GCP credentials are configured
        id: gcp_creds
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -n "$GCP_SA_KEY" ]; then
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GCP_SA_KEY 未設定のため日次レポートをスキップします"
          fi

      - name: Authenticate to Google Cloud
        if: steps.gcp_creds.outputs.has_key == 'true'
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        if: steps.gcp_creds.outputs.has_key == 'true'
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up Node.js
        if: steps.gcp_creds.outputs.has_key == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Generate & send daily report
        if: steps.gcp_creds.outputs.has_key == 'true'
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TZ: Asia/Tokyo
        run: |
          DATE_ARG="${{ github.event.inputs.date }}"
          if [ -n "$DATE_ARG" ]; then
            node scripts/summarize_ad_performance.js --date "$DATE_ARG"
          else
            node scripts/summarize_ad_performance.js
          fi
