name: Generate Daily Blog

# 毎日 JST 07:00 (UTC 22:00 前日) に Gemini API で
# 4言語 (ja / en / zh-TW / zh-CN) のブログ記事を1件自動生成し、
# main に直接コミット & プッシュする。
#
# 後続:
# - push を契機に deploy.yml が frontend をビルド & Cloud Run へデプロイ
# - blog_check.yml が当日記事の存在を別系統で監視
#
# NOTE: 既定の GITHUB_TOKEN による push では他ワークフローはトリガーされない
# (GitHub の無限ループ防止仕様)。deploy.yml を連鎖起動させるため
# Secrets.PAT_TOKEN (repo / workflow スコープの PAT) を使って push する。

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

concurrency:
  group: generate-daily-blog
  cancel-in-progress: false

jobs:
  generate:
    name: Generate & commit blog post
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          # PAT を使って checkout することで .git/config に PAT 認証情報が
          # 永続化され、後続の `git push` も PAT で認証される
          # → deploy.yml など他ワークフローを連鎖起動できる
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Firestore (social_templates) への X 投稿テンプレート自動追加に使用。
      # 認証情報が無い場合でも generate_daily_blog.js は警告のみで継続する。
      - name: Check if GCP credentials are configured
        id: gcp_creds
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -n "$GCP_SA_KEY" ]; then
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Google Cloud
        if: steps.gcp_creds.outputs.has_key == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Generate blog post (4 languages)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          TZ: Asia/Tokyo
        run: node scripts/generate_daily_blog.js

      # 全 ja 記事を Firestore `social_templates` と突き合わせ、未登録の
      # X 投稿テンプレートを一括追加する（idempotent）。
      # generate_daily_blog.js 内のインライン書き込みが失敗していた過去分も
      # ここでまとめて補填される。Firestore 認証が設定されていない場合は
      # ステップ自体をスキップ（記事生成はすでに成功している前提）。
      - name: Sync blog social templates to Firestore
        if: steps.gcp_creds.outputs.has_key == 'true'
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          TZ: Asia/Tokyo
        run: node scripts/sync_blog_social_templates.js

      - name: Commit and push generated articles
        env:
          TZ: Asia/Tokyo
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # remote URL を PAT 認証付きに張り替える (checkout で永続化された
          # GITHUB_TOKEN を上書きする保険、PAT による push が確実に動くようにする)
          git remote set-url origin "https://x-access-token:${PAT_TOKEN}@github.com/${GH_REPO}.git"

          git add frontend/content/blog/

          if git diff --cached --quiet; then
            echo "::notice::No new blog articles produced. Nothing to commit."
            exit 0
          fi

          TODAY=$(date +%Y-%m-%d)
          NEW_FILES=$(git diff --cached --name-only --diff-filter=A | tr '\n' ' ')
          echo "New files: ${NEW_FILES}"

          MSG_FILE=$(mktemp)
          {
            echo "feat: auto-generate daily blog post (${TODAY})"
            echo
            echo "Generated via GitHub Actions (.github/workflows/generate-blog.yml)"
            echo "Files: ${NEW_FILES}"
            echo
            echo "Co-Authored-By: Gemini <noreply@google.com>"
          } > "$MSG_FILE"
          git commit -F "$MSG_FILE"

          # 競合した場合に備えてリベースしてから push
          git pull --rebase origin main
          git push origin main
